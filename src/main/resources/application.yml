# Configuração principal da aplicação Spring Boot
spring:
  application:
    name: my-project
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Configuração do Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    property-naming-strategy: SNAKE_CASE
    time-zone: America/Sao_Paulo
  
  # Configuração JPA
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Configuração de Segurança
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}
      roles: ADMIN

# Configuração do servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# Configuração do Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Configuração de Logging
logging:
  level:
    com.example.myproject: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Configuração da aplicação
app:
  name: ${spring.application.name}
  version: "@project.version@"
  description: "Template de arquitetura Java perfeito com Spring Boot"
  
  # Configurações de segurança
  security:
    jwt:
      secret: ${JWT_SECRET:mySecretKey}
      expiration: ${JWT_EXPIRATION:86400000} # 24 horas
    
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
  
  # Configurações de cache
  cache:
    enabled: ${CACHE_ENABLED:true}
    ttl: ${CACHE_TTL:3600} # 1 hora
  
  # Configurações de API
  api:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_RPM:100}

# Configuração do OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: ${app.name}
    description: ${app.description}
    version: ${app.version}
    contact:
      name: Seu Nome
      email: seu.email@exemplo.com
      url: https://github.com/seuusuario/my-project
  
---
# Perfil de Desenvolvimento
spring:
  config:
    activate:
      on-profile: dev
  
  # Banco H2 para desenvolvimento
  datasource:
    url: jdbc:h2:mem:devdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# Configuração de logging para desenvolvimento
logging:
  level:
    com.example.myproject: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# Perfil de Teste
spring:
  config:
    activate:
      on-profile: test
  
  # Banco H2 para testes
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop

# Desabilitar logs durante testes
logging:
  level:
    com.example.myproject: WARN
    org.springframework: WARN
    org.hibernate: WARN

---
# Perfil de Produção
spring:
  config:
    activate:
      on-profile: prod
  
  # Configuração do PostgreSQL para produção
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/myproject}
    username: ${DATABASE_USERNAME:myproject}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Configuração de logging para produção
logging:
  level:
    com.example.myproject: INFO
    org.springframework: WARN
    org.hibernate: WARN
  file:
    name: /var/log/myproject/application.log

